<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary Meta -->
    <title>LearnHub — Expert Online Courses &amp; Training</title>
    <meta name="description" content="Discover 120+ expert-led online courses in tech, design, and business. Learn at your own pace and advance your career with LearnHub." />
    <meta name="author" content="LearnHub" />
    <meta name="keywords" content="online courses, e-learning, tech courses, design courses, business training, career development" />
    <link rel="canonical" href="https://learnhub.app/" />

    <!-- Crawl permissions -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LearnHub" />
    <meta property="og:title" content="LearnHub — Expert Online Courses &amp; Training" />
    <meta property="og:description" content="Discover 120+ expert-led online courses in tech, design, and business. Learn at your own pace and advance your career." />
    <meta property="og:url" content="https://learnhub.app/" />
    <meta property="og:image" content="https://c.animaapp.com/mnmyaijxgewU4q/img/generated-image-1775551422855.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="LearnHub online courses platform icon" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@learnhub" />
    <meta name="twitter:title" content="LearnHub — Expert Online Courses &amp; Training" />
    <meta name="twitter:description" content="Discover 120+ expert-led online courses in tech, design, and business. Advance your career with LearnHub." />
    <meta name="twitter:image" content="https://c.animaapp.com/mnmyaijxgewU4q/img/generated-image-1775551422855.png" />
    <meta name="twitter:image:alt" content="LearnHub online courses platform icon" />

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0072de" />
    <meta name="msapplication-TileColor" content="#1a365d" />

    <!-- Sitemap reference -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "LearnHub",
      "url": "https://learnhub.app",
      "logo": "https://c.animaapp.com/mnmyaijxgewU4q/img/generated-image-1775551422855.png",
      "description": "Online learning platform offering 120+ expert-led courses in technology, design, and business.",
      "sameAs": [],
      "offers": {
        "@type": "Offer",
        "category": "OnlineCourse",
        "availability": "https://schema.org/InStock"
      },
      "hasCourseInstance": {
        "@type": "CourseInstance",
        "courseMode": "online",
        "instructor": {
          "@type": "Person",
          "name": "Expert Instructors"
        }
      }
    }
    </script>

    <!-- DNS prefetch for asset CDN -->
    <link rel="dns-prefetch" href="https://c.animaapp.com" />
    <link rel="preconnect" href="https://c.animaapp.com" crossorigin />

    <!-- Google Fonts: preconnect first, then non-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Montserrat:wght@600&family=Poppins:wght@400&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Montserrat:wght@600&family=Poppins:wght@400&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Montserrat:wght@600&family=Poppins:wght@400&display=swap" />
    </noscript>

    <!-- Preload above-the-fold hero images -->
    <link rel="preload" as="image" href="https://c.animaapp.com/mnmyaijxgewU4q/img/uploaded-asset-1776140688440-0.png" />
    <link rel="preload" as="image" href="https://c.animaapp.com/mnmyaijxgewU4q/img/screan-2.svg" />
    <link rel="preload" as="image" href="https://c.animaapp.com/mnmyaijxgewU4q/img/screan-01.png" />

    <link href="tailwind.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/index.tsx"></script>
  </body>
</html>
